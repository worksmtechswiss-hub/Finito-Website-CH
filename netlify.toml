[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

# Redirects from old Webflow URLs
[[redirects]]
  from = "/app-fuer-dienstleister"
  to = "/de/branchen"
  status = 301

[[redirects]]
  from = "/funktionen"
  to = "/de/funktionen"
  status = 301

[[redirects]]
  from = "/preise"
  to = "/de/preise"
  status = 301

[[redirects]]
  from = "/team"
  to = "/de/team"
  status = 301

[[redirects]]
  from = "/kontakt"
  to = "/de/kontakt"
  status = 301

[[redirects]]
  from = "/faq"
  to = "/de/faq"
  status = 301

[[redirects]]
  from = "/agbs"
  to = "/de/agbs"
  status = 301

[[redirects]]
  from = "/datenschutz"
  to = "/de/datenschutz"
  status = 301

[[redirects]]
  from = "/impressum"
  to = "/de/impressum"
  status = 301

[[redirects]]
  from = "/marktplatz"
  to = "/de/marktplatz"
  status = 301

[[redirects]]
  from = "/apis"
  to = "/de/apis"
  status = 301

[[redirects]]
  from = "/kunden"
  to = "/de/kunden"
  status = 301

[[redirects]]
  from = "/helpfull"
  to = "/de/faq"
  status = 301

[[redirects]]
  from = "/help"
  to = "/de/faq"
  status = 301

[[redirects]]
  from = "/finito-landingpage"
  to = "/de"
  status = 301

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
